<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>图片背景移除工具</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: 'Arial', sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }
        
        .container {
            background: white;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0,0,0,0.1);
            padding: 40px;
            max-width: 1200px;
            width: 100%;
        }
        
        h1 {
            text-align: center;
            color: #333;
            margin-bottom: 30px;
            font-size: 2.5em;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }
        
        .upload-section {
            text-align: center;
            margin-bottom: 40px;
        }
        
        .upload-area {
            border: 3px dashed #667eea;
            border-radius: 15px;
            padding: 40px;
            margin-bottom: 20px;
            background: #f8f9ff;
            transition: all 0.3s ease;
            cursor: pointer;
        }
        
        .upload-area:hover {
            border-color: #764ba2;
            background: #f0f2ff;
        }
        
        .upload-area.dragover {
            border-color: #764ba2;
            background: #e8ebff;
            transform: scale(1.02);
        }
        
        .upload-icon {
            font-size: 3em;
            color: #667eea;
            margin-bottom: 20px;
        }
        
        .upload-text {
            font-size: 1.2em;
            color: #666;
            margin-bottom: 15px;
        }
        
        .file-input {
            display: none;
        }
        
        .upload-btn {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            border: none;
            padding: 12px 30px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
        }
        
        .upload-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(102, 126, 234, 0.4);
        }
        
        .status {
            text-align: center;
            margin: 20px 0;
            font-size: 1.1em;
            color: #666;
        }
        
        .loading {
            display: none;
            text-align: center;
            margin: 20px 0;
        }
        
        .spinner {
            border: 4px solid #f3f3f3;
            border-top: 4px solid #667eea;
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto;
        }
        
        .progress-bar {
            width: 100%;
            height: 4px;
            background: #f0f0f0;
            border-radius: 2px;
            margin: 15px 0;
            overflow: hidden;
        }
        
        .progress-fill {
            height: 100%;
            background: linear-gradient(90deg, #667eea, #764ba2);
            border-radius: 2px;
            width: 0%;
            transition: width 0.3s ease;
        }
        
        .stats {
            display: flex;
            justify-content: space-around;
            margin: 20px 0;
            padding: 15px;
            background: #f8f9ff;
            border-radius: 10px;
        }
        
        .stat-item {
            text-align: center;
        }
        
        .stat-value {
            font-size: 1.2em;
            font-weight: bold;
            color: #667eea;
        }
        
        .stat-label {
            font-size: 0.9em;
            color: #666;
        }
        
        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }
        
        .preview-section {
            display: none;
            margin-top: 40px;
        }
        
        .preview-container {
            display: flex;
            gap: 30px;
            justify-content: center;
            flex-wrap: wrap;
        }
        
        .preview-box {
            text-align: center;
            flex: 1;
            min-width: 300px;
        }
        
        .preview-title {
            font-size: 1.3em;
            font-weight: bold;
            margin-bottom: 15px;
            color: #333;
        }
        
        .preview-image {
            max-width: 100%;
            max-height: 400px;
            border-radius: 10px;
            box-shadow: 0 10px 20px rgba(0,0,0,0.1);
            margin-bottom: 15px;
        }
        
        .download-btn {
            background: linear-gradient(135deg, #28a745 0%, #20c997 100%);
            color: white;
            border: none;
            padding: 12px 25px;
            border-radius: 25px;
            font-size: 1em;
            cursor: pointer;
            transition: all 0.3s ease;
            text-decoration: none;
            display: inline-block;
        }
        
        .download-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(40, 167, 69, 0.4);
        }
        
        .error {
            background: #f8d7da;
            color: #721c24;
            padding: 15px;
            border-radius: 10px;
            margin: 20px 0;
            text-align: center;
            display: none;
        }
        
        @media (max-width: 768px) {
            .container {
                padding: 20px;
            }
            
            .preview-container {
                flex-direction: column;
            }
            
            h1 {
                font-size: 2em;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <h1>图片背景移除工具</h1>
        
        <div class="upload-section">
            <div class="upload-area" id="uploadArea">
                <div class="upload-icon">📸</div>
                <div class="upload-text">拖拽图片到这里或点击上传</div>
                <div style="font-size: 0.9em; color: #999; margin-bottom: 20px;">支持 JPG、PNG 格式</div>
                <button class="upload-btn" onclick="document.getElementById('fileInput').click()">选择图片</button>
            </div>
            <input type="file" id="fileInput" class="file-input" accept="image/jpeg,image/jpg,image/png">
        </div>
        
        <div class="status" id="status"></div>
        <div class="loading" id="loading">
            <div class="spinner"></div>
            <div style="margin-top: 15px;">正在处理图片...</div>
            <div class="progress-bar">
                <div class="progress-fill" id="progressFill"></div>
            </div>
            <div class="stats">
                <div class="stat-item">
                    <div class="stat-value" id="fileSize">0 KB</div>
                    <div class="stat-label">文件大小</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="processingTime">0ms</div>
                    <div class="stat-label">处理时间</div>
                </div>
                <div class="stat-item">
                    <div class="stat-value" id="statusText">上传中</div>
                    <div class="stat-label">状态</div>
                </div>
            </div>
        </div>
        <div class="error" id="error"></div>
        
        <div class="preview-section" id="previewSection">
            <div class="preview-container">
                <div class="preview-box">
                    <div class="preview-title">原图</div>
                    <img id="originalImage" class="preview-image" alt="原图">
                </div>
                <div class="preview-box">
                    <div class="preview-title">无背景图</div>
                    <img id="processedImage" class="preview-image" alt="处理后的图片">
                    <br>
                    <a id="downloadBtn" class="download-btn" download="no-background.png">下载 PNG</a>
                </div>
            </div>
        </div>
    </div>

    <script>
        const uploadArea = document.getElementById('uploadArea');
        const fileInput = document.getElementById('fileInput');
        const status = document.getElementById('status');
        const loading = document.getElementById('loading');
        const error = document.getElementById('error');
        const previewSection = document.getElementById('previewSection');
        const originalImage = document.getElementById('originalImage');
        const processedImage = document.getElementById('processedImage');
        const downloadBtn = document.getElementById('downloadBtn');

        // Drag and drop handlers
        uploadArea.addEventListener('dragover', (e) => {
            e.preventDefault();
            uploadArea.classList.add('dragover');
        });

        uploadArea.addEventListener('dragleave', () => {
            uploadArea.classList.remove('dragover');
        });

        uploadArea.addEventListener('drop', (e) => {
            e.preventDefault();
            uploadArea.classList.remove('dragover');
            const files = e.dataTransfer.files;
            if (files.length > 0) {
                handleFile(files[0]);
            }
        });

        uploadArea.addEventListener('click', () => {
            fileInput.click();
        });

        fileInput.addEventListener('change', (e) => {
            if (e.target.files.length > 0) {
                handleFile(e.target.files[0]);
            }
        });

        function handleFile(file) {
            // Validate file type
            if (!file.type.match('image.*')) {
                showError('请选择图片文件（JPG、PNG格式）');
                return;
            }

            // Show file size
            const fileSize = (file.size / 1024).toFixed(1);
            document.getElementById('fileSize').textContent = `${fileSize} KB`;

            // Show original image
            const reader = new FileReader();
            reader.onload = (e) => {
                originalImage.src = e.target.result;
                status.textContent = '图片已上传，正在处理...';
                uploadImage(file);
            };
            reader.readAsDataURL(file);
        }

        async function uploadImage(file) {
            // Show loading
            loading.style.display = 'block';
            error.style.display = 'none';
            previewSection.style.display = 'none';
            status.textContent = '正在上传图片...';

            // Validate file size
            const maxSize = 25 * 1024 * 1024; // 25MB
            if (file.size > maxSize) {
                showError(`文件大小超过限制（最大 ${Math.round(maxSize / 1024 / 1024)}MB）`);
                return;
            }

            try {
                // Check API health first
                document.getElementById('statusText').textContent = '检查服务状态...';
                document.getElementById('progressFill').style.width = '10%';
                
                const healthResponse = await fetch('/health');
                if (!healthResponse.ok) {
                    throw new Error('服务暂时不可用，请稍后再试');
                }

                document.getElementById('statusText').textContent = '上传图片...';
                document.getElementById('progressFill').style.width = '30%';
                
                const formData = new FormData();
                formData.append('image', file);

                const startTime = Date.now();
                
                document.getElementById('statusText').textContent = '正在处理...';
                document.getElementById('progressFill').style.width = '60%';
                
                const response = await fetch('/process', {
                    method: 'POST',
                    body: formData,
                });

                const responseTime = Date.now() - startTime;
                console.log(`API响应时间: ${responseTime}ms`);

                if (!response.ok) {
                    const errorData = await response.json();
                    throw new Error(errorData.error || '处理失败');
                }

                document.getElementById('statusText').textContent = '生成结果...';
                document.getElementById('progressFill').style.width = '90%';

                // Show processed image
                const blob = await response.blob();
                const imageUrl = URL.createObjectURL(blob);
                processedImage.src = imageUrl;
                downloadBtn.href = imageUrl;

                // Show performance metrics
                document.getElementById('processingTime').textContent = `${responseTime}ms`;
                
                status.innerHTML = `
                    处理完成！用时 ${responseTime}ms
                    <span style="color: #28a745; margin-left: 10px;">✅</span>
                `;

                document.getElementById('statusText').textContent = '完成';
                document.getElementById('progressFill').style.width = '100%';

                // Hide loading and show preview
                loading.style.display = 'none';
                previewSection.style.display = 'block';

            } catch (err) {
                loading.style.display = 'none';
                console.error('上传错误:', err);
                showError(err.message || '处理图片时发生错误');
            }
        }

        function showError(message) {
            error.innerHTML = `
                <div style="display: flex; align-items: center; justify-content: center;">
                    <span style="margin-right: 10px;">❌</span>
                    <span>${message}</span>
                </div>
            `;
            error.style.display = 'block';
            loading.style.display = 'none';
            status.textContent = '处理失败，请重试';
        }
    </script>
</body>
</html>
